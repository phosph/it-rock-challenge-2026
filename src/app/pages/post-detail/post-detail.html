<ng-template #spinner>
  <div class="flex items-center justify-center py-12" role="status">
    <span class="material-symbols-outlined text-4xl text-neutral-300 animate-spin" aria-hidden="true">progress_activity</span>
    <span class="sr-only">Loading post...</span>
  </div>
</ng-template>

<app-dialog-layout title="Post" (closed)="close()">
  @defer (on immediate) {
    @if (post(); as p) {
      <!-- Post content -->
      <app-post-card [post]="p" [showCommentAction]="false" flat (like)="onLike()" (share)="onShare()" (tag)="onTag()" />

      <!-- Comment input -->
      @if (user(); as u) {
        <div class="px-5 py-4 border-t border-neutral-100">
          <app-comment-input
            [avatarUrl]="u.avatar"
            [authorName]="u.displayName"
            (commentSubmit)="onCommentSubmit($event)"
          />
        </div>
      }

      <!-- Comments list -->
      <div class="px-5 pb-4">
        @for (comment of p.comments; track comment.id) {
          <app-comment-item [comment]="comment" />
        } @empty {
          <p class="text-sm text-neutral-400 py-4 text-center">No comments yet. Be the first!</p>
        }
      </div>
    } @else if (loading()) {
      <ng-container *ngTemplateOutlet="spinner" />
    }
  } @placeholder {
    <ng-container *ngTemplateOutlet="spinner" />
  }
</app-dialog-layout>
