<ng-template #spinner>
  <div class="flex items-center justify-center py-12" role="status">
    <span class="material-symbols-outlined text-4xl text-neutral-300 animate-spin" aria-hidden="true">progress_activity</span>
    <span class="sr-only">Loading post...</span>
  </div>
</ng-template>

<!-- Backdrop (desktop only, click to close) -->
<div class="hidden sm:block absolute inset-0"
     (click)="onBackdropClick($event)"
     aria-hidden="true"></div>

<div class="flex flex-col flex-1 w-full sm:card sm:relative sm:flex-initial sm:max-w-lg sm:w-full sm:mx-4 sm:max-h-[90vh]"
     role="dialog"
     aria-modal="true"
     aria-labelledby="post-detail-title"
     (keydown.escape)="close()">

  <!-- Header -->
  <header class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
    <h2 id="post-detail-title" class="text-lg font-bold text-neutral-900">Post</h2>
    <button type="button"
            class="w-9 h-9 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-500 hover:bg-neutral-200 hover:text-neutral-700 transition-colors"
            (click)="close()"
            aria-label="Close">
      <span class="material-symbols-outlined" aria-hidden="true">close</span>
    </button>
  </header>

  <!-- Scrollable body -->
  <div class="flex-1 overflow-y-auto">
    @defer (on immediate) {
      @if (post(); as p) {
        <!-- Post content -->
        <app-post-card [post]="p" [showCommentAction]="false" flat (like)="onLike()" (share)="onShare()" (tag)="onTag()" />

        <!-- Comment input -->
        @if (user(); as u) {
          <div class="px-5 py-4 border-t border-neutral-100">
            <app-comment-input
              [avatarUrl]="u.avatar"
              [authorName]="u.displayName"
              (commentSubmit)="onCommentSubmit($event)"
            />
          </div>
        }

        <!-- Comments list -->
        <div class="px-5 pb-4">
          @for (comment of p.comments; track comment.id) {
            <app-comment-item [comment]="comment" />
          } @empty {
            <p class="text-sm text-neutral-400 py-4 text-center">No comments yet. Be the first!</p>
          }
        </div>
      } @else if (loading()) {
        <ng-container *ngTemplateOutlet="spinner" />
      }
    } @placeholder {
      <ng-container *ngTemplateOutlet="spinner" />
    }
  </div>
</div>
