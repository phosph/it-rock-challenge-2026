<!-- Login Card -->
<main class="w-full sm:max-w-[440px] card shadow-floating relative z-10">

  <!-- Top Decorative Bar -->
  <div class="h-1.5 w-full bg-linear-to-r from-primary-600 via-primary-500 to-primary-600" aria-hidden="true"></div>

  <div class="p-8 sm:p-10">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-6 relative">
        <div
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-primary-50 rounded-full animate-pulse"
          aria-hidden="true"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-primary-100 rounded-full"
          aria-hidden="true"></div>
        <div
          class="relative w-12 h-12 bg-white rounded-xl shadow-md border border-neutral-100 flex items-center justify-center z-10">
          <span class="material-symbols-outlined text-primary-600 text-2xl" aria-hidden="true">eco</span>
        </div>
      </div>
      <h1 class="text-[28px] font-semibold text-neutral-900 mb-2 tracking-tight leading-tight">Welcome back</h1>
      <p class="text-neutral-500 text-sm sm:text-base leading-relaxed">Please enter your details to sign in.</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <app-form-field label="Email" type="email" icon="mail" placeholder="Enter your email"
        formControlName="email" />

      <!-- Password -->
      <app-form-field label="Password" type="password" icon="lock" placeholder="••••••••"
        formControlName="password" />

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <!-- TODO: extract checkbox atom -->
          <input id="remember-me" type="checkbox" formControlName="rememberMe"
            class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-neutral-300 rounded cursor-pointer transition-colors" />
          <label for="remember-me" class="ml-2 block text-sm text-neutral-600 cursor-pointer select-none">Remember for
            30 days</label>
        </div>
        <a href="#" class="text-sm link">Forgot password?</a>
      </div>

      <!-- Error message -->
      @if (authStore.error()) {
      <div class="form-error" role="alert">
        {{ authStore.error() }}
      </div>
      }

      <!-- Submit -->
      <button type="submit" [disabled]="authStore.loading()" class="btn-filled w-full justify-center">
        @if (authStore.loading()) {
        <span class="material-symbols-outlined animate-spin mr-2 text-lg" aria-hidden="true">progress_activity</span> Signing in...
        } @else {
        Sign in
        }
      </button>

      <!-- Social Login -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-neutral-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-neutral-500">Or continue with</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
          <button type="button" class="btn-outlined w-full gap-3" (click)="loginWithProvider('google')">
            <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Google</span>
          </button>
          <button type="button" class="btn-outlined w-full gap-3" (click)="loginWithProvider('twitter')">
            <svg class="w-5 h-5 text-[#1DA1F2]" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23.953 4.57a10 10 0 0 1-2.825.775 4.958 4.958 0 0 0 2.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 0 0-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 0 0-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 0 1-2.228-.616v.06a4.923 4.923 0 0 0 3.946 4.827 4.996 4.996 0 0 1-2.212.085 4.936 4.936 0 0 0 4.604 3.417 9.867 9.867 0 0 1-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 0 0 7.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0 0 24 4.59z"/></svg>
            <span>Twitter</span>
          </button>
        </div>
      </div>
    </form>

    <!-- Sign Up Link -->
    <div class="mt-8 text-center">
      <p class="text-sm text-neutral-600">
        Don't have an account?
        <a href="#" class="link ml-1">Sign up</a>
      </p>
    </div>
  </div>

  <!-- Bottom decorative -->
  <div class="h-2 w-full bg-neutral-50 border-t border-neutral-100" aria-hidden="true"></div>
</main>
