<!-- Backdrop (desktop only, click to close) -->
<div class="hidden sm:block absolute inset-0"
     (click)="onBackdropClick($event)"
     (keydown)="onBackdropKeydown($event)"
     aria-hidden="true"></div>

<div class="flex flex-col flex-1 w-full sm:card sm:relative sm:flex-initial sm:max-w-lg sm:w-full sm:mx-4 sm:max-h-[90vh]"
     role="dialog"
     aria-labelledby="publish-title"
     (keydown.escape)="close()">

  <!-- Header -->
  <header class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
    <h2 id="publish-title" class="text-lg font-bold text-neutral-900">Create Post</h2>
    <button type="button"
            class="w-9 h-9 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-500 hover:bg-neutral-200 hover:text-neutral-700 transition-colors"
            (click)="close()"
            aria-label="Close">
      <i class="fa-solid fa-xmark" aria-hidden="true"></i>
    </button>
  </header>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto px-5 py-4 space-y-4">
    <!-- Author -->
    @if (user(); as u) {
      <div class="flex items-center gap-3">
        <img [src]="u.avatar" [alt]="u.displayName"
             class="w-11 h-11 rounded-full object-cover ring-2 ring-white shadow-sm" />
        <span class="text-sm font-semibold text-neutral-900">{{ u.displayName }}</span>
      </div>
    }

    <!-- Textarea -->
    <form [formGroup]="form" (ngSubmit)="submit()">
      <textarea formControlName="content"
                class="w-full resize-none outline-none text-neutral-800 text-[15px] leading-relaxed placeholder:text-neutral-400 min-h-[120px]"
                placeholder="What's on your mind?"
                aria-label="Post content"
                rows="4"></textarea>
    </form>

    <!-- Image fields -->
    @if (showImageFields()) {
      <div class="space-y-3 p-4 rounded-xl bg-neutral-50 border border-neutral-200">
        <div>
          <label for="publish-image-url" class="block text-xs font-medium text-neutral-600 mb-1">Image URL</label>
          <input id="publish-image-url"
                 type="url"
                 [formControl]="form.controls.imageUrl"
                 class="form-input px-3 py-2 text-sm"
                 placeholder="https://example.com/photo.jpg" />
        </div>
        <div>
          <label for="publish-image-alt" class="block text-xs font-medium text-neutral-600 mb-1">Alt text</label>
          <input id="publish-image-alt"
                 type="text"
                 [formControl]="form.controls.imageAlt"
                 class="form-input px-3 py-2 text-sm"
                 placeholder="Describe the image" />
        </div>
      </div>
    }

    <!-- Image preview -->
    @if (form.controls.imageUrl.value; as url) {
      @if (url.trim()) {
        <div class="relative rounded-xl overflow-hidden border border-neutral-200 shadow-sm">
          <img [src]="url" [alt]="form.controls.imageAlt.value || 'Preview'" class="w-full max-h-60 object-cover" />
          <button type="button"
                  (click)="clearImage()"
                  class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/60 text-white flex items-center justify-center hover:bg-black/80 transition-colors text-xs"
                  aria-label="Remove image">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
      }
    }
  </div>

  <!-- Footer -->
  <footer class="flex items-center justify-between px-5 py-4 border-t border-neutral-100">
    <div class="flex gap-1">
      <button type="button"
              class="w-9 h-9 flex items-center justify-center rounded-lg text-primary-600 hover:bg-primary-50 transition-colors"
              [class.bg-primary-50]="showImageFields()"
              (click)="toggleImageFields()"
              [attr.aria-pressed]="showImageFields()"
              aria-label="Add image">
        <i class="fa-regular fa-image" aria-hidden="true"></i>
      </button>
    </div>
    <button type="button"
            class="btn-filled px-6"
            [disabled]="!canSubmit()"
            (click)="submit()">
      Post
    </button>
  </footer>
</div>
